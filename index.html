<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarX Season 1 Calculator</title>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --primary: #f59e0b; /* Solar Orange */
            --primary-glow: #fbbf24;
            --accent: #38bdf8; /* Space Blue */
            --text: #f8fafc;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #020617);
        }

        /* Animated Gradient Border */
        .glow-wrapper {
            position: relative;
            padding: 3px;
            border-radius: 24px;
            background: conic-gradient(from 180deg at 50% 50%, var(--primary), var(--accent), var(--primary));
            animation: spin 4s linear infinite;
            max-width: 500px;
            width: 90%;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 22px; 
            position: relative;
            z-index: 1;
            /* Keeps the card content from rotating with the border */
        }

        .card-content {
            transform: none; /* Stops the rotation of inner text */
        }

        /* To stop the content from spinning, we apply animation only to the wrapper's background */
        .glow-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: inherit;
            z-index: -1;
        }
        
        /* Static Content fix */
        .container {
            background: var(--card-bg);
            border-radius: 21px;
            padding: 30px;
        }

        h2 { 
            margin-top: 0; 
            font-size: 1.8rem; 
            text-align: center; 
            background: linear-gradient(to right, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .stats-badge {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        label { display: block; margin-bottom: 10px; color: #94a3b8; font-size: 0.9rem; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            border: 1px solid #334155; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 20px; 
            background: #020617; 
            color: var(--primary); 
            font-weight: bold;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 800; 
            text-transform: uppercase;
            transition: 0.2s;
        }
        button:hover { background: var(--primary-glow); transform: scale(1.02); }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            display: none;
            border: 1px solid #334155;
        }

        .token-amt { font-size: 2.5rem; color: var(--primary); font-weight: 900; margin: 10px 0; }

        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #64748b; padding-bottom: 10px; border-bottom: 1px solid #334155; }
        td { padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .val-col { color: var(--primary); font-weight: bold; text-align: right; }
    </style>
</head>
<body>

<div class="glow-wrapper">
    <div class="container">
        <h2>SolarX Airdrop</h2>
        
        <div class="stats-badge">
            <div style="color: var(--primary); font-weight: bold; margin-bottom: 4px;">Season 1 Active</div>
            Total Network Flares: 410,000,000,000
        </div>

        <label>Enter Your Flare Points</label>
        <input type="text" id="flareInput" placeholder="0" oninput="formatNumber(this)" />
        
        <button onclick="calculate()">View My Rewards</button>

        <div id="resultBox" class="result-box">
            <div style="color: #94a3b8;">Estimated Allocation</div>
            <div id="tokenOutput" class="token-amt">0 SLX</div>
            
            <table>
                <thead>
                    <tr>
                        <th>FDV</th>
                        <th style="text-align: right;">USD Value</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function formatNumber(input) {
        let value = input.value.replace(/\D/g, '');
        input.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function calculate() {
        const raw = document.getElementById('flareInput').value.replace(/,/g, '');
        const flares = parseFloat(raw);
        if (!flares) return;

        const tokens = (flares / 410000000000) * 85000000;
        
        document.getElementById('resultBox').style.display = "block";
        document.getElementById('tokenOutput').innerText = Math.round(tokens).toLocaleString() + " SLX";

        const vals = [100, 200, 300, 400, 500];
        let html = '';
        vals.forEach(v => {
            const usd = tokens * (v * 1000000 / 1000000000);
            html += `<tr>
                <td>$${v}M Market Cap</td>
                <td class="val-col">$${usd.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = html;
    }
</script>

</body>
</html>
